<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Homework Management</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ✅ ADD: KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    
    <!-- ✅ ADD: KaTeX JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-user-shield"></i>
                    <h1>Admin Panel</h1>
                </div>
                <div class="header-actions">
                    <a href="/logout" class="btn btn-danger" style="background: #E74C3C; color: white;">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                    <a href="/" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Back to Portal
                    </a>
                </div>
            </div>
        </header>

        <div class="admin-container">
            <div class="admin-tabs">
                <button class="tab-btn active" data-tab="add">
                    <i class="fas fa-plus-circle"></i> Add Homework
                </button>
                <button class="tab-btn" data-tab="manage">
                    <i class="fas fa-edit"></i> Manage Homework
                </button>
            </div>

            <!-- Add Homework Tab -->
            <div id="addTab" class="tab-content active">
                <div class="admin-card">
                    <h3><i class="fas fa-plus"></i> Add New Homework</h3>
                    <form id="addHomeworkForm" class="admin-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="hwClass">Class *</label>
                                <select id="hwClass" required>
                                    <option value="">Select Class</option>
                                    <option value="5">Class 5</option>
                                    <option value="6">Class 6</option>
                                    <option value="7">Class 7</option>
                                    <option value="8">Class 8</option>
                                    <option value="9">Class 9</option>
                                    <option value="10">Class 10</option>
                                    <option value="11">Class 11</option>
                                    <option value="12">Class 12</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="hwSubject">Subject *</label>
                                <select id="hwSubject" required>
                                    <option value="">Select Subject</option>
                                    <option value="maths">Maths</option>
                                    <option value="physics">Physics</option>
                                    <option value="chemistry">Chemistry</option>
                                    <option value="biology">Biology</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="hwType">Question Type *</label>
                                <select id="hwType" required>
                                    <option value="">Select Type</option>
                                    <option value="mcqs">MCQs</option>
                                    <option value="saq">Short Answer</option>
                                    <option value="vsaq">Very Short Answer</option>
                                    <option value="laq">Long Answer</option>
                                </select>
                            </div>
                        </div>

                        <!-- Chapter and Topic Fields -->
                        <div class="form-row">
                            <div class="form-group">
                                <label for="hwChapter">
                                    <i class="fas fa-layer-group"></i> Chapter
                                </label>
                                <input type="text" id="hwChapter" placeholder="e.g., Cell Structure, Quadratic Equations">
                            </div>

                            <div class="form-group">
                                <label for="hwTopic">
                                    <i class="fas fa-tags"></i> Topic
                                </label>
                                <input type="text" id="hwTopic" placeholder="e.g., Cell Membrane, Factorisation">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="hwQuestion">Question *</label>
                            <textarea id="hwQuestion" rows="4" required placeholder="Enter the question"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="hwQuestionImage">
                                <i class="fas fa-image"></i> Question Image (Optional)
                            </label>
                            <input type="file" id="hwQuestionImage" accept="image/*">
                            <div id="questionImagePreview" class="image-preview"></div>
                        </div>

                        <div class="form-group" id="optionsGroup" style="display: none;">
                            <label>Options with Image Support (for MCQs)</label>
                            <div class="options-container">
                                <div class="option-row">
                                    <div class="option-group">
                                        <input type="text" placeholder="Option A text" class="option-text">
                                        <input type="file" accept="image/*" class="option-image" data-option="0">
                                        <div class="option-preview" id="optionPreview0"></div>
                                    </div>
                                    <input type="radio" name="correctOption" value="0"> Correct
                                </div>
                                <div class="option-row">
                                    <div class="option-group">
                                        <input type="text" placeholder="Option B text" class="option-text">
                                        <input type="file" accept="image/*" class="option-image" data-option="1">
                                        <div class="option-preview" id="optionPreview1"></div>
                                    </div>
                                    <input type="radio" name="correctOption" value="1"> Correct
                                </div>
                                <div class="option-row">
                                    <div class="option-group">
                                        <input type="text" placeholder="Option C text" class="option-text">
                                        <input type="file" accept="image/*" class="option-image" data-option="2">
                                        <div class="option-preview" id="optionPreview2"></div>
                                    </div>
                                    <input type="radio" name="correctOption" value="2"> Correct
                                </div>
                                <div class="option-row">
                                    <div class="option-group">
                                        <input type="text" placeholder="Option D text" class="option-text">
                                        <input type="file" accept="image/*" class="option-image" data-option="3">
                                        <div class="option-preview" id="optionPreview3"></div>
                                    </div>
                                    <input type="radio" name="correctOption" value="3"> Correct
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="hwMarks">Marks</label>
                                <input type="number" id="hwMarks" value="1" min="1">
                            </div>

                            <div class="form-group">
                                <label for="hwDate">Date</label>
                                <input type="date" id="hwDate">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="hwHint">Hint (Optional)</label>
                            <input type="text" id="hwHint" placeholder="Add a hint for students">
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Add Homework
                        </button>
                    </form>
                </div>
            </div>

            <!-- Manage Homework Tab -->
            <div id="manageTab" class="tab-content">
                <div class="admin-card">
                    <h3><i class="fas fa-edit"></i> Manage Existing Homework</h3>
                    <div class="manage-filters">
                        <select id="manageClass">
                            <option value="">All Classes</option>
                            <option value="5">Class 5</option>
                            <option value="6">Class 6</option>
                            <option value="7">Class 7</option>
                            <option value="8">Class 8</option>
                            <option value="9">Class 9</option>
                            <option value="10">Class 10</option>
                            <option value="11">Class 11</option>
                            <option value="12">Class 12</option>
                        </select>
                        <select id="manageSubject">
                            <option value="">All Subjects</option>
                            <option value="maths">Maths</option>
                            <option value="physics">Physics</option>
                            <option value="chemistry">Chemistry</option>
                            <option value="biology">Biology</option>
                        </select>
                        <select id="manageChapter">
                            <option value="">All Chapters</option>
                        </select>
                        <select id="manageTopic">
                            <option value="">All Topics</option>
                        </select>
                        <button id="loadHomework" class="btn btn-primary">
                            <i class="fas fa-sync"></i> Load Homework
                        </button>
                    </div>
                    <div id="manageList" class="manage-list">
                        <!-- Homework list will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    
<!-- ✅ ADD: LaTeX Render Script for Admin -->
<script>
    function renderMath() {
        if (typeof renderMathInElement === 'function') {
            try {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '\\[', right: '\\]', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false}
                    ],
                    throwOnError: false,
                    trust: true
                });
            } catch (e) {
                console.log('LaTeX render error:', e);
            }
        }
    }
    
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(renderMath, 1000);
        
        // Load chapters and topics for manage section
        loadManageChapters();
        loadManageTopics();
        
        // Event listeners for manage filters
        document.getElementById('manageClass')?.addEventListener('change', function() {
            const subject = document.getElementById('manageSubject')?.value || '';
            const classValue = this.value;
            loadManageChapters(subject, classValue);
            loadManageTopics(null, subject, classValue);
        });
        
        document.getElementById('manageSubject')?.addEventListener('change', function() {
            const classValue = document.getElementById('manageClass')?.value || '';
            loadManageChapters(this.value, classValue);
            loadManageTopics(null, this.value, classValue);
        });
        
        document.getElementById('manageChapter')?.addEventListener('change', function() {
            const subject = document.getElementById('manageSubject')?.value || '';
            const classValue = document.getElementById('manageClass')?.value || '';
            loadManageTopics(this.value, subject, classValue);
        });
    });
    
    // Load chapters for manage section
    function loadManageChapters(subject, classValue) {
        const chapterSelect = document.getElementById('manageChapter');
        if (!chapterSelect) return;
        
        const params = new URLSearchParams();
        if (subject) params.append('subject', subject);
        if (classValue) params.append('class', classValue);
        
        fetch(`/api/chapters?${params.toString()}`)
            .then(response => response.json())
            .then(chapters => {
                chapterSelect.innerHTML = '<option value="">All Chapters</option>';
                chapters.forEach(chapter => {
                    const option = document.createElement('option');
                    option.value = chapter;
                    option.textContent = chapter;
                    chapterSelect.appendChild(option);
                });
            })
            .catch(error => console.error('Error loading chapters:', error));
    }
    
    // Load topics for manage section
    function loadManageTopics(chapter, subject, classValue) {
        const topicSelect = document.getElementById('manageTopic');
        if (!topicSelect) return;
        
        const params = new URLSearchParams();
        if (chapter) params.append('chapter', chapter);
        if (subject) params.append('subject', subject);
        if (classValue) params.append('class', classValue);
        
        fetch(`/api/topics?${params.toString()}`)
            .then(response => response.json())
            .then(topics => {
                topicSelect.innerHTML = '<option value="">All Topics</option>';
                topics.forEach(topic => {
                    const option = document.createElement('option');
                    option.value = topic;
                    option.textContent = topic;
                    topicSelect.appendChild(option);
                });
            })
            .catch(error => console.error('Error loading topics:', error));
    }
</script>

<script src="/static/js/script.js"></script>
</body>
</html>
