<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Homework Management</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-user-shield"></i>
                    <h1>Admin Panel</h1>
                </div>
                <div class="header-actions">
                    <a href="/" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Back to Portal
                    </a>
                </div>
            </div>
        </header>

        <div class="admin-container">
            <div class="admin-tabs">
                <button class="tab-btn active" data-tab="add">
                    <i class="fas fa-plus-circle"></i> Add Homework
                </button>
                <button class="tab-btn" data-tab="manage">
                    <i class="fas fa-edit"></i> Manage Homework
                </button>
            </div>

            <!-- Add Homework Tab -->
            <div id="addTab" class="tab-content active">
                <div class="admin-card">
                    <h3><i class="fas fa-plus"></i> Add New Homework</h3>
                    <form id="addHomeworkForm" class="admin-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="hwClass">Class *</label>
                                <select id="hwClass" required>
                                    <option value="">Select Class</option>
                                    <option value="5">Class 5</option>
                                    <option value="6">Class 6</option>
                                    <option value="7">Class 7</option>
                                    <option value="8">Class 8</option>
                                    <option value="9">Class 9</option>
                                    <option value="10">Class 10</option>
                                    <option value="11">Class 11</option>
                                    <option value="12">Class 12</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="hwSubject">Subject *</label>
                                <select id="hwSubject" required>
                                    <option value="">Select Subject</option>
                                    <option value="maths">Maths</option>
                                    <option value="physics">Physics</option>
                                    <option value="chemistry">Chemistry</option>
                                    <option value="biology">Biology</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="hwType">Question Type *</label>
                                <select id="hwType" required>
                                    <option value="">Select Type</option>
                                    <option value="mcqs">MCQs</option>
                                    <option value="saq">Short Answer</option>
                                    <option value="vsaq">Very Short Answer</option>
                                    <option value="laq">Long Answer</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="hwQuestion">Question *</label>
                            <textarea id="hwQuestion" rows="4" required placeholder="Enter the question"></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="hwMarks">Marks</label>
                                <input type="number" id="hwMarks" value="1" min="1">
                            </div>

                            <div class="form-group">
                                <label for="hwDate">Date</label>
                                <input type="date" id="hwDate">
                            </div>
                        </div>

                        <div class="form-group" id="optionsGroup" style="display: none;">
                            <label>Options (for MCQs)</label>
                            <div class="options-container">
                                <div class="option-row">
                                    <input type="text" placeholder="Option A" class="option-input">
                                    <input type="radio" name="correctOption" value="0"> Correct
                                </div>
                                <div class="option-row">
                                    <input type="text" placeholder="Option B" class="option-input">
                                    <input type="radio" name="correctOption" value="1"> Correct
                                </div>
                                <div class="option-row">
                                    <input type="text" placeholder="Option C" class="option-input">
                                    <input type="radio" name="correctOption" value="2"> Correct
                                </div>
                                <div class="option-row">
                                    <input type="text" placeholder="Option D" class="option-input">
                                    <input type="radio" name="correctOption" value="3"> Correct
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="hwHint">Hint (Optional)</label>
                            <input type="text" id="hwHint" placeholder="Add a hint for students">
                        </div>

                        <div class="form-group">
                            <label for="hwImage">Image (Optional)</label>
                            <input type="file" id="hwImage" accept="image/*">
                            <div id="imagePreview" class="image-preview"></div>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Add Homework
                        </button>
                    </form>
                </div>
            </div>

            <!-- Manage Homework Tab -->
            <div id="manageTab" class="tab-content">
                <div class="admin-card">
                    <h3><i class="fas fa-edit"></i> Manage Existing Homework</h3>
                    <div class="manage-filters">
                        <select id="manageClass">
                            <option value="">All Classes</option>
                            <option value="5">Class 5</option>
                            <option value="6">Class 6</option>
                            <option value="7">Class 7</option>
                            <option value="8">Class 8</option>
                            <option value="9">Class 9</option>
                            <option value="10">Class 10</option>
                            <option value="11">Class 11</option>
                            <option value="12">Class 12</option>
                        </select>
                        <select id="manageSubject">
                            <option value="">All Subjects</option>
                            <option value="maths">Maths</option>
                            <option value="physics">Physics</option>
                            <option value="chemistry">Chemistry</option>
                            <option value="biology">Biology</option>
                        </select>
                        <button id="loadHomework" class="btn btn-primary">
                            <i class="fas fa-sync"></i> Load Homework
                        </button>
                    </div>
                    <div id="manageList" class="manage-list">
                        <!-- Homework list will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
