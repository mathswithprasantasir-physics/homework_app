{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4><i class="bi bi-plus-circle"></i> Add New Question</h4>
            </div>
            <div class="card-body">
                <form id="questionForm" method="POST" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="subject_id" class="form-label">Subject & Class</label>
                            <select class="form-select" id="subject_id" name="subject_id" required>
                                <option value="">Select Subject</option>
                                {% for subject in subjects %}
                                <option value="{{ subject.id }}">
                                    {{ subject.name }} - Class {{ subject.class_level }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="col-md-3 mb-3">
                            <label for="question_type" class="form-label">Question Type</label>
                            <select class="form-select" id="question_type" name="question_type" required>
                                <option value="">Select Type</option>
                                <option value="MCQ">Multiple Choice (MCQ)</option>
                                <option value="SAQ">Short Answer (SAQ)</option>
                                <option value="VSAQ">Very Short Answer (VSAQ)</option>
                                <option value="LAQ">Long Answer (LAQ)</option>
                            </select>
                        </div>
                        
                        <div class="col-md-2 mb-3">
                            <label for="marks" class="form-label">Marks</label>
                            <input type="number" class="form-control" id="marks" name="marks" value="1" min="1" required>
                        </div>
                        
                        <div class="col-md-3 mb-3">
                            <label for="difficulty" class="form-label">Difficulty</label>
                            <select class="form-select" id="difficulty" name="difficulty">
                                <option value="easy">Easy</option>
                                <option value="medium" selected>Medium</option>
                                <option value="hard">Hard</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="question_text" class="form-label">Question Text</label>
                        <textarea class="form-control" id="question_text" name="question_text" rows="4" required></textarea>
                        <small class="text-muted">You can use LaTeX: $...$ for inline, $$...$$ for display</small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="question_latex" class="form-label">LaTeX Content (Optional)</label>
                        <textarea class="form-control" id="question_latex" name="question_latex" rows="3"></textarea>
                    </div>
                    
                    <!-- MCQ Options Section -->
                    <div id="mcqOptions" style="display: none;">
                        <h5 class="mt-3">MCQ Options</h5>
                        <div id="optionsContainer">
                            <div class="row mb-2 option-row">
                                <div class="col-md-1">
                                    <label class="form-label">A)</label>
                                </div>
                                <div class="col-md-10">
                                    <input type="text" class="form-control option-input" name="options[]" placeholder="Option A">
                                </div>
                                <div class="col-md-1">
                                    <input type="radio" name="correct_option" value="0" class="mt-2">
                                </div>
                            </div>
                            <div class="row mb-2 option-row">
                                <div class="col-md-1">
                                    <label class="form-label">B)</label>
                                </div>
                                <div class="col-md-10">
                                    <input type="text" class="form-control option-input" name="options[]" placeholder="Option B">
                                </div>
                                <div class="col-md-1">
                                    <input type="radio" name="correct_option" value="1" class="mt-2">
                                </div>
                            </div>
                            <div class="row mb-2 option-row">
                                <div class="col-md-1">
                                    <label class="form-label">C)</label>
                                </div>
                                <div class="col-md-10">
                                    <input type="text" class="form-control option-input" name="options[]" placeholder="Option C">
                                </div>
                                <div class="col-md-1">
                                    <input type="radio" name="correct_option" value="2" class="mt-2">
                                </div>
                            </div>
                            <div class="row mb-2 option-row">
                                <div class="col-md-1">
                                    <label class="form-label">D)</label>
                                </div>
                                <div class="col-md-10">
                                    <input type="text" class="form-control option-input" name="options[]" placeholder="Option D">
                                </div>
                                <div class="col-md-1">
                                    <input type="radio" name="correct_option" value="3" class="mt-2">
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="question_image" class="form-label">Upload Image (Optional)</label>
                        <input type="file" class="form-control" id="question_image" name="question_image" accept="image/*">
                        <div id="imagePreview" class="mt-2"></div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="correct_answer" class="form-label">Correct Answer / Solution</label>
                        <textarea class="form-control" id="correct_answer" name="correct_answer" rows="3"></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Save Question
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
