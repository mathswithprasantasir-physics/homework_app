{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2 class="mb-4"><i class="bi bi-book"></i> My Homework</h2>
    
    <!-- Filters -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <div class="row">
                <div class="col-md-3">
                    <label class="form-label">Class</label>
                    <select class="form-select" id="classFilter">
                        <option value="">All Classes</option>
                        {% for i in range(5, 13) %}
                        <option value="{{ i }}">Class {{ i }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Subject</label>
                    <select class="form-select" id="subjectFilter">
                        <option value="">All Subjects</option>
                        {% for subject in subjects %}
                        <option value="{{ subject.id }}">{{ subject.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Week</label>
                    <select class="form-select" id="weekFilter">
                        <option value="">All Weeks</option>
                        <option value="current">This Week</option>
                        <option value="last">Last Week</option>
                        <option value="two_weeks">2 Weeks Ago</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button class="btn btn-primary w-100" onclick="applyFilters()">
                        <i class="bi bi-funnel"></i> Apply
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Homework List -->
    <div class="row">
        {% for homework in homeworks %}
        <div class="col-md-6 mb-3">
            <div class="card homework-card">
                <div class="card-body">
                    <h5>{{ homework.title }}</h5>
                    <p>
                        <span class="badge bg-primary">Class {{ homework.class_level }}</span>
                        <span class="badge bg-info">{{ homework.subject.name }}</span>
                        <span class="badge bg-warning">{{ homework.total_marks }} Marks</span>
                    </p>
                    <a href="{{ url_for('view_homework_detail', homework_id=homework.id) }}" 
                       class="btn btn-outline-primary btn-sm">View</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script>
function applyFilters() {
    const classVal = document.getElementById('classFilter').value;
    const subjectVal = document.getElementById('subjectFilter').value;
    const weekVal = document.getElementById('weekFilter').value;
    
    let url = '/student/dashboard?';
    if (classVal) url += 'class=' + classVal + '&';
    if (subjectVal) url += 'subject=' + subjectVal + '&';
    if (weekVal) url += 'week=' + weekVal;
    
    window.location.href = url;
}
</script>
{% endblock %}
